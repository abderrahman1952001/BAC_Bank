name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  release-check:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: bac_bank
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d bac_bank"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/bac_bank?schema=public
      REDIS_URL: redis://localhost:6379
      REDIS_REQUIRED: "true"
      CLERK_SECRET_KEY: sk_test_example
      NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: pk_test_ZXhhbXBsZS5jbGVyay5hY2NvdW50cy5kZXYk
      CORS_ORIGIN: http://localhost:3000
      PUBLIC_API_BASE_URL: http://localhost:4000
      NEXT_PUBLIC_API_BASE_URL: http://localhost:4000/api/v1

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Migration smoke test
        run: npm run prisma:migrate:deploy -w @bac-bank/api

      - name: Release check
        run: npm run release:check

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: Web smoke e2e
        run: npm run test:e2e:web
