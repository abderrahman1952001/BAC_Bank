  - "الاحتمالات الشرطية خاصة بشعبة علوم تجريبية."
  - "الأعداد والحساب خاصة بشعبتي رياضيات وتقني رياضي."
  - "الهندسة في الفضاء تظهر في بكالوريات قديمة ولا يتم تدريسها في السنوات الحالية حسب ملاحظة المستخدم."
